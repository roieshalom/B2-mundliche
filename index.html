<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>B2 Mündliche Prüfung – Übung</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>B2 Mündliche Prüfung</h1>
      <p class="subtitle">Zufällige Aufgaben für die Prüfungsvorbereitung</p>
      <button class="info-btn" id="infoBtn" aria-label="Info">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
      </button>
    </header>

    <div class="modal-overlay hidden" id="infoPanel">
      <div class="modal-card">
        <button class="modal-close" id="infoPanelClose" aria-label="Schließen">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>

        <p class="info-feedback-label">Aufgabe vorschlagen</p>
        <textarea class="info-textarea" id="feedbackText" placeholder="Schreib hier deine Aufgabe oder deinen Vorschlag…" rows="4"></textarea>
        <button class="info-submit" id="feedbackSubmit">Vorschlag senden</button>

        <div class="stats-divider">
          <span>Stats</span>
        </div>

        <p class="stats-simple"><span id="statTotal">0</span> Generiert</p>
        <p class="stat-last" id="statLast"></p>
      </div>
    </div>

    <section class="selector">
      <div class="teil-cards">
        <button class="teil-card" data-teil="teil2">
          <div class="teil-card-top">
            <span class="teil-label">Teil 2</span>
            <span class="teil-desc">3 Min.</span>
          </div>
          <span class="teil-title">Diskussion am Arbeitsplatz</span>
        </button>
        <button class="teil-card" data-teil="teil3">
          <div class="teil-card-top">
            <span class="teil-label">Teil 3</span>
            <span class="teil-desc">4 Min.</span>
          </div>
          <span class="teil-title">Lösungswege diskutieren</span>
        </button>
      </div>

      <button class="generate-btn" id="generateBtn" disabled>
        Aufgabe generieren
      </button>
    </section>

    <section class="loading hidden" id="loading">
      <div class="loading-spinner"></div>
      <p class="loading-text">Aufgabe wird geladen…</p>
    </section>

    <section class="result hidden" id="result">
      <div class="result-header">
        <span class="result-badge" id="resultBadge"></span>
        <h2 class="result-thema" id="resultThema"></h2>
      </div>
      <div class="cards-area" id="cardsArea"></div>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
